<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Collection</title>
    
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
            padding-bottom: 60px;
        }

        /* Back Navigation */
        .back-nav {
            padding: 20px 8%;
        }

        .back-btn {
            text-decoration: none;
            color: #2f3640;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #ff4757;
        }

        /* Header Styling */
        .products-header {
            text-align: center;
            padding: 10px 8% 40px 8%;
        }

        .products-header h1 {
            font-size: 36px;
            color: #2f3640;
        }

        .products-header h1 span {
            color: #ff4757;
        }

        .products-header p {
            color: #718093;
            margin-top: 5px;
        }

        /* 4-Column Grid System (प्रॉडक्ट्स शेजारी शेजारी आणण्यासाठी) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 0 8%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card Container */
        .product-card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* CRITICAL FIXED HEIGHT: यामुळे इमेज कधीच मोठी होणार नाही */
        .product-image {
            width: 100%;
            height: 300px; /* फिक्स हाईट */
            background-color: #f5f5f5;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* इमेज चपटी किंवा खराब होणार नाही */
            object-position: top;
        }

        /* Product Info Text */
        .product-info {
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .product-info h3 {
            font-size: 18px;
            color: #2f3640;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Price Styling */
        .price {
            font-size: 20px;
            color: #ff4757;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .old-price {
            font-size: 14px;
            color: #a4b0be;
            text-decoration: line-through;
            font-weight: 400;
            margin-left: 8px;
        }

        /* Button Styling */
        .cart-btn {
            background-color: #2f3640;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .cart-btn:hover {
            background-color: #ff4757;
        }

        /* Responsive Settings */
        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: 1fr;
                padding: 0 4%;
            }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="../Fashion.html" class="back-btn">← Back to Fashion</a>
    </div>

    <header class="products-header">
        <h1>Men's <span>Collection</span></h1>
        
    </header>

    <section class="products-grid">
        
        <div class="product-card">
            <div class="product-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROHJ2h4BG-L9-EnBn0YmmAVUNg9blOqDtpWfIqKzdAJw&s=10" alt="T-Shirt 01">
            </div>
            <div class="product-info">
                <h3>Premium T-Shirt 01</h3>
                <p class="price">₹499 <span class="old-price">₹999</span></p>
                <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGZBn_FnbdvFDnjWNc6DTJwmRtNlkllSABCNF_hezTDQ&s=10" alt="T-Shirt 02">
            </div>
            <div class="product-info">
                <h3>Casual T-Shirt 02</h3>
                <p class="price">₹549 <span class="old-price">₹1,199</span></p>
                <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQgafYTr8yqNA-XOIf8Ngq1I0t-pMbMo-qGwJhgz09QKQ&s=10" alt="T-Shirt 03">
            </div>
            <div class="product-info">
                <h3>Sports T-Shirt 03</h3>
                <p class="price">₹399 <span class="old-price">₹799</span></p>
                 <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

       

    </section>

</body>
</html>
