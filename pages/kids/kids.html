<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Collection</title>
    
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f6f8fa;
            color: #333;
            padding-bottom: 60px;
        }

        /* Back Navigation */
        .back-nav {
            padding: 25px 8% 10px 8%;
        }

        .back-btn {
            text-decoration: none;
            color: #57606f;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #ff4757;
        }

        /* Header Styling */
        .kids-header {
            text-align: center;
            padding: 10px 8% 50px 8%;
        }

        .kids-header h1 {
            font-size: 40px;
            color: #2f3640;
            font-weight: 700;
        }

        .kids-header h1 span {
            color: #ff4757;
        }

        .kids-header p {
            color: #747d8c;
            margin-top: 8px;
            font-size: 16px;
        }

        /* Category Grid (फक्त २ मोठे कार्ड्स शेजारी आणण्यासाठी) */
        .category-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 0 8%;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* Kids Custom Card Design */
        .kids-card {
            position: relative;
            width: 450px;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .kids-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.15);
        }

        /* Card Image */
        .kids-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .kids-card:hover img {
            transform: scale(1.06);
        }

        /* Beautiful Gradient Overlay */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 15%, rgba(0,0,0,0.1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
        }

        .card-overlay h3 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Explore Button Styling */
        .explore-btn {
            text-decoration: none;
            background-color: white;
            color: #2f3640;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: inline-block;
        }

        .explore-btn:hover {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .category-container {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }
            .kids-card {
                width: 100%;
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="../Fashion.html" class="back-btn">← Back to Fashion</a>
    </div>

    <header class="kids-header">
        <h1>Kids <span>Collection</span></h1>
        
    </header>

    <section class="category-container">
        
        <div class="kids-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROMCSkst8Nms90XIPfzR_g6QDsfMUqVjpnTk0mce_G6g&s=10" alt="Boys Collection">
            <div class="card-overlay">
                <h3>Boys Collection</h3>
                <a href="./Boys/Boys.html" class="explore-btn">Explore Now</a>
            </div>
        </div>

        <div class="kids-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1mUFfWtb0U38BZAGqwDDB13mznBvRMUTbUHDZYzR4hw&s=10" alt="Girls Collection">
            <div class="card-overlay">
                <h3>Girls Collection</h3>
                <a href="./Girls/Girls.html" class="explore-btn">Explore Now</a>
            </div>
        </div>

    </section>

</body>
</html>
