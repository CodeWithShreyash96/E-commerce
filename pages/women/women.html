<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Collection</title>
    
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f6f8fa;
            color: #333;
            padding-bottom: 60px;
        }

        /* Back Navigation */
        .back-nav {
            padding: 25px 8% 10px 8%;
        }

        .back-btn {
            text-decoration: none;
            color: #57606f;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #ff4757;
        }

        /* Header Styling */
        .products-header {
            text-align: center;
            padding: 10px 8% 40px 8%;
        }

        .products-header h1 {
            font-size: 36px;
            color: #2f3640;
            font-weight: 700;
        }

        .products-header h1 span {
            color: #ff4757;
        }

        .products-header p {
            color: #747d8c;
            margin-top: 8px;
            font-size: 15px;
        }

        /* 4-Column Responsive Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            padding: 0 8%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Premium Card Container */
        .product-card {
            background-color: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
        }

        /* Fixed Image Settings */
        .product-image {
            width: 100%;
            height: 320px;
            background-color: #f1f2f6;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.04);
        }

        /* Product Info Typography */
        .product-info {
            padding: 22px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .product-info h3 {
            font-size: 17px;
            color: #2f3640;
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* Modern Price Styling */
        .price {
            font-size: 21px;
            color: #ff4757;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .old-price {
            font-size: 14px;
            color: #a4b0be;
            text-decoration: line-through;
            font-weight: 400;
            margin-left: 8px;
        }

        /* Beautiful Full-Width 'Buy Now' Button */
        .cart-btn {
            background-color: #2f3640;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(47, 54, 64, 0.15);
        }

        .cart-btn:hover {
            background-color: #ff4757;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        /* LINK FIXED: बटनच्या आतील लिंक पांढरी दिसेल आणि अंडरलाईन निघून जाईल */
        .cart-btn a {
            color: white !important;
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Mobile Friendly */
        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 20px;
                padding: 0 5%;
            }
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="../Fashion.html" class="back-btn">← Back to Fashion</a>
    </div>

    <header class="products-header">
        <h1>Women's <span>Collection</span></h1>
        
    </header>

    <section class="products-grid">
        
        <div class="product-card">
            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=500&auto=format&fit=crop" alt="Dress 01">
            </div>
            <div class="product-info">
                <h3>Premium Kurtis 01</h3>
                <p class="price">₹699 <span class="old-price">₹1,499</span></p>
                <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

        
        <div class="product-card">
            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?q=80&w=500&auto=format&fit=crop" alt="Dress 03">
            </div>
            <div class="product-info">
                <h3>Western One Piece 03</h3>
                <p class="price">₹999 <span class="old-price">₹2,499</span></p>
                <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=500&auto=format&fit=crop" alt="Top 01">
            </div>
            <div class="product-info">
                <h3>Designer Top 04</h3>
                <p class="price">₹499 <span class="old-price">₹999</span></p>
                <button class="cart-btn"><a href="../../payment/payment.html">Buy Now</a></button>
            </div>
        </div>

    </section>

</body>
</html>
